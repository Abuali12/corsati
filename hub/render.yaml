databases:
  - name: mysitedb
    plan: free
    databaseName: mysitedb
    user: course_hub

services:
  - type: web
    plan: free
    name: course_hub
    runtime: python
    buildCommand: |
      cd hub
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate

    startCommand: |
      cd hub
      gunicorn hub.asgi:application -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mysitedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4