databases:
  - name: mysitedb
    plan: Basic-256mb
    databaseName: mysitedb
    user: course_hub

services:
  - type: web
    plan: Starter
    name: course_hub
    runtime: python
    buildCommand: |
      cd hub
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate

    startCommand: |
      cd hub
      gunicorn hub.asgi:application -k uvicorn.workers.UvicornWorker --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mysitedb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: 'course-hub-5tic.onrender.com,www.course-hub-5tic.onrender.com'
      - key: SITE_ID
        value: '2'
