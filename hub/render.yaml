databases:
  - name: course_hubdb
    plan: free
    databaseName: course_hubdb
    user: course_hub

services:
  - type: web
    plan: free
    name: course_hub
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'python -m gunicorn hub.hub.asgi:application -k uvicorn.workers.UvicornWorker'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: course_hubdb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4